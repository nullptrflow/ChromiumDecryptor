name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build
      run: msbuild ChromiumDecryptor.sln /p:Configuration=Release /p:Platform=x64 /t:Build /p:OutputPath=Decryptor/

    - name: Get version
      id: version
      run: echo "version=$(date +'%Y.%m.%d.%H%M%S')" >> $GITHUB_OUTPUT

    - name: Create Tag
      uses: actions/create-tag@v1
      with:
        tag: 'v${{ steps.version.outputs.version }}'
        message: 'Release ${{ steps.version.outputs.version }}'

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: 'v${{ steps.version.outputs.version }}'
        files: Decryptor/ChromiumDecryptor.dll
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
