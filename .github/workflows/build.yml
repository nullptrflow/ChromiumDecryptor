name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build
      run: msbuild ChromiumDecryptor.sln /p:Configuration=Release /p:Platform=x64 /t:Build

    - name: Find DLL
      id: find
      run: |
        $dll = Get-ChildItem -Recurse -Filter "ChromiumDecryptor.dll" | Where-Object { $_.Name -eq "ChromiumDecryptor.dll" } | Select-Object -First 1
        if ($dll) {
          Write-Host "Found DLL: $($dll.FullName)"
          Write-Host "dll_path=$($dll.FullName)" >> $env:GITHUB_OUTPUT
        } else {
          Write-Host "DLL not found"
        }

    - name: Get version
      id: version
      run: |
        $version = Get-Date -Format "yyyy.MM.dd.HHmmss"
        echo "version=$version" >> $env:GITHUB_OUTPUT

    - name: Create Tag
      run: git tag "v${{ steps.version.outputs.version }}"

    - name: Upload Release Asset
      if: steps.find.outputs.dll_path
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ steps.version.outputs.version }}"
        files: ${{ steps.find.outputs.dll_path }}
        body: "ChromiumDecryptor - Decrypt Chromium browser master keys"
