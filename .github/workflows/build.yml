name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: msbuild ChromiumDecryptor.sln /t:Restore /p:Configuration=Release /p:Platform=x64

    - name: Build
      run: msbuild ChromiumDecryptor.sln /p:Configuration=Release /p:Platform=x64 /t:Build /p:OutputPath=Decryptor/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChromiumDecryptor
        path: Decryptor/ChromiumDecryptor.dll
